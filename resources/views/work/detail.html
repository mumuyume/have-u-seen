<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品詳細（感想あり） - HaveUSeen</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .star-rating { display:inline-flex; font-size:1.5rem; line-height:1; color:#d1d5db; }
  .star-rating .filled { color:#facc15; }
  .star-rating .half { position:relative; display:inline-block; color:#d1d5db; }
  .star-rating .half::before { content:"★"; position:absolute; top:0; left:0; width:50%; overflow:hidden; color:#facc15; }
</style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">

  <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="list.html" class="text-lg font-bold text-gray-900 dark:text-white">HaveUSeen</a>
      <div class="flex items-center gap-4">
        <a href="list.html" class="text-sm font-medium text-gray-600 hover:text-blue-600 dark:text-gray-300">作品一覧</a>
        <a href="mypage.html" class="text-sm font-medium text-gray-600 hover:text-blue-600 dark:text-gray-300">マイページ</a>
        <a href="login.html" class="text-sm font-medium text-gray-600 hover:text-blue-600 dark:text-gray-300">ログアウト</a>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-6">
    <a href="list.html" class="text-sm text-blue-600 hover:underline dark:text-blue-400">← 一覧に戻る</a>

    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm mt-3 p-6 flex flex-col sm:flex-row gap-6">
      <div class="w-full sm:w-40 h-56 bg-gray-200 dark:bg-gray-700 rounded-lg flex items-center justify-center text-gray-400 text-xs shrink-0">サムネイル画像</div>
      <div class="flex-1">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">作品タイトルA</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">制作年：20XX</p>
        <div class="flex flex-wrap gap-1.5 mt-3">
          <span class="text-xs px-2.5 py-1 rounded-full bg-blue-50 text-blue-700 dark:bg-blue-900 dark:text-blue-300">SF</span>
          <span class="text-xs px-2.5 py-1 rounded-full bg-blue-50 text-blue-700 dark:bg-blue-900 dark:text-blue-300">感動</span>
          <span class="text-xs px-2.5 py-1 rounded-full bg-blue-50 text-blue-700 dark:bg-blue-900 dark:text-blue-300">バトル</span>
        </div>
        <p class="text-sm text-gray-600 dark:text-gray-300 mt-3 leading-relaxed">ここに作品の概要・あらすじが入ります。</p>

        <div class="mt-5">
          <label class="block mb-1.5 text-sm font-medium text-gray-700 dark:text-gray-300">視聴ステータス（クリックで切り替え）</label>
          <div class="inline-flex rounded-lg overflow-hidden border border-gray-300 dark:border-gray-600 text-sm">
            <a href="detail.html" class="px-3 py-1.5 bg-white text-gray-600 hover:bg-gray-100 dark:bg-gray-700 dark:text-gray-300 border-r border-gray-300 dark:border-gray-600">未視聴</a>
            <a href="detail.html" class="px-3 py-1.5 bg-white text-gray-600 hover:bg-gray-100 dark:bg-gray-700 dark:text-gray-300 border-r border-gray-300 dark:border-gray-600">気になる</a>
            <a href="detail.html" class="px-3 py-1.5 bg-white text-gray-600 hover:bg-gray-100 dark:bg-gray-700 dark:text-gray-300 border-r border-gray-300 dark:border-gray-600">視聴中</a>
            <a href="detail.html" class="px-3 py-1.5 bg-green-600 text-white font-medium">視聴済み</a>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm mt-4 p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-gray-900 dark:text-white">自分の感想・評価</h2>
        <!-- 感想を編集する → 感想フォームへ -->
        <a href="impression-form.html" class="text-sm font-medium text-blue-600 border border-blue-600 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-lg px-4 py-2">
          感想を編集する
        </a>
      </div>
      <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4">
        <div class="flex items-center justify-between flex-wrap gap-2">
          <div class="flex items-center gap-2">
            <span class="star-rating">
              <span class="filled">★</span><span class="filled">★</span><span class="filled">★</span><span class="filled">★</span><span class="half"></span>
            </span>
            <span class="text-sm text-gray-500 dark:text-gray-400">4.5（5点満点）</span>
          </div>
          <!-- 削除 → 一覧に戻る -->
          <a href="list.html" class="text-xs font-medium text-red-600 hover:underline dark:text-red-400">この感想を削除する</a>
        </div>
        <p class="text-sm text-gray-700 dark:text-gray-300 mt-3 leading-relaxed">
          ここに自分が書いた感想メモが表示されます。「このシーンが良かった」「キャラクターの掘り下げが秀逸」など、自由に記録できるエリアです。
        </p>
      </div>
    </div>
  </main>
</body>
</html>
